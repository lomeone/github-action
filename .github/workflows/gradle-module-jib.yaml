name: Module JIB Build

on:
  workflow_call:
    inputs:
      runner:
        description: 'The runner to use for the test job'
        required: false
        type: string
        default: 'ubuntu-24.04-arm'
      module-name:
        description: 'The module to build with jib'
        required: true
        type: string

jobs:
  jib:
    name: Gradle Jib
    runs-on: ${{ inputs.runner }}
    permissions:
      contents: read
      packages: read
      id-token: write

    steps:
      - name: Configure AWS Credential
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ECR_PUSH_ROLE }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: private

      - name: Gradle jib
        uses: lomeone/github-action/gradle/jib@main
        with:
          module-name: ${{ inputs.module-name }}
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
